[pytest]
testpaths = _tests
python_files = test_*.py
addopts =
    -ra
    -q
    --strict-markers
    --cov=app
    --cov=react_agent
    --cov-report=term-missing:skip-covered
    --cov-report=xml
    --cov-fail-under=30
filterwarnings =
    ignore::DeprecationWarning
    ignore::ResourceWarning
markers =
    db: tests requiring SQLite-backed DB mode
    smoke_llm: tests that hit a real LLM (skipped by default)