name: release

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    name: build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install frontend deps + build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Sync frontend dist into wheel payload
        run: |
          rm -rf app/frontend/dist
          cp -r frontend/dist app/frontend/dist
          mkdir -p app/frontend/dist/src
          cp -r frontend/src/style.css frontend/src/css app/frontend/dist/src/

      - name: Build sdist + wheel
        run: python -m pip install --upgrade build && python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
